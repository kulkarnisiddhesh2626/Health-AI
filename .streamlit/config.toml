[theme]
# Forces a clean, readable Light Theme
base="light"

# Main app background (pure white)
backgroundColor="#ffffff"

# Sidebar background (light grayish-blue)
secondaryBackgroundColor="#f1f5f9"

# Force all text to be pure black
textColor="#000000"

# Button colors (Streamlit blue)
primaryColor="#2563eb"

font="sans serif"
